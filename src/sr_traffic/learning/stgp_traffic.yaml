# template for traffic parameters file
gp:
  num_individuals: 1
  generations: 1
  multi_island:
    num_islands: 1
    migration: { "freq": 10, "frac": 0.05 }
  crossover_prob: 0.
  mut_prob: 0.
  frac_elitist: 0
  min_: 2
  max_: 4
  overlapping_generation: True
  validate: False
  penalty: { "method": "length", "reg_param": 0.01}
  select:
    fun: random.sample
    kargs: "{'k': self.num_individuals}"
  mutate:
    fun: gp.mixedMutate
    kargs: "{'expr': toolbox.expr_mut, 'pset': pset, 'prob': [0.7, 0.2, 0.1]}"
    expr_mut: gp.genHalfAndHalf
    expr_mut_kargs: "{'min_': 2, 'max_': 4, 'max_length': 20}"
  crossover:
    fun: gp.cxOnePoint
    kargs: "{}"
  immigration: { "enabled": False, "freq": 10, "frac": 0.9 }
  primitives:
    imports: { "flex.gp.cochain_primitives": ["coch_primitives"],
              "flex.gp.jax_primitives": ["jax_primitives"]} 
    used:  [
    {"name": "AddF", "dimension": null, "rank": null},
    {"name": "SubF", "dimension": null, "rank": null},
    {"name": "MulF", "dimension": null, "rank": null},
    {"name": "Div", "dimension": null, "rank": null},
    {"name": "SquareF", "dimension": null, "rank": null},
    {"name": "SqrtF", "dimension": null, "rank": null},
    {"name": "ExpF", "dimension": null, "rank": null},
    #{"name": "LogF", "dimension": null, "rank": null},
    {"name": "AddC", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    {"name": "SubC", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    {"name": "Square", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    {"name": "Sqrt", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    {"name": "MF", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    {"name": "Exp", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    #{"name": "Log", "dimension": [!dim 0, !dim 1], "rank": [!rank SC]},
    { "name": "cob", "dimension": [!dim 0], "rank": [!rank SC] },
    { "name": "del", "dimension": [!dim 1], "rank": [!rank SC] },
    { "name": "St1", "dimension": [!dim 0, !dim 1], "rank": [!rank SC] },
    #{ "name": "InvM", "dimension": [!dim 0, !dim 1], "rank": [!rank SC] },
    { "name": "CMul", "dimension": [!dim 0, !dim 1], "rank": [!rank SC] },
    #{ "name": "Inn", "dimension": [!dim 0, !dim 1], "rank": [!rank SC] },
  ]
  num_cpus: 1
  batch_size: 1
  max_calls: 2
  set_seed: True
  road_name: "US80"
  task: "prediction"
  ansatz: {"flux": triangular_flux, "v": triangular_v, "opt_coeffs":  [0.37013956, 1.48964708, 6.59672108]}
